<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Nyarlatho : félin de fumée noire avec trop de pattes -->
  <defs>
    <linearGradient id="g7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="100%" stop-color="#16161f"/>
    </linearGradient>
  </defs>
  <!-- Volutes de fumée -->
  <g fill="#2a2a3d" opacity="0.7">
    <ellipse cx="30" cy="45" rx="12" ry="8" transform="rotate(-20 30 45)"/>
    <ellipse cx="95" cy="40" rx="10" ry="6" transform="rotate(15 95 40)"/>
    <ellipse cx="20" cy="70" rx="8" ry="5"/>
  </g>
  <!-- Corps félin -->
  <path d="M30 65 C30 48 45 42 60 42 C80 42 95 50 95 68 C95 80 85 86 75 86 L40 86 C32 84 30 75 30 65 Z" fill="url(#g7)" stroke="#0a0a12" stroke-width="3"/>
  <!-- Queue de fumée -->
  <path d="M95 65 C108 60 112 45 105 32 C112 42 104 55 98 58" fill="#2a2a3d"/>
  <path d="M95 65 C110 58 115 42 106 30" stroke="#4a4a6a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Trop de pattes (6) -->
  <g stroke="#16161f" stroke-width="6" stroke-linecap="round">
    <path d="M38 84 L36 104"/>
    <path d="M50 86 L49 106"/>
    <path d="M61 86 L61 105"/>
    <path d="M72 86 L73 106"/>
    <path d="M83 83 L86 103"/>
    <path d="M44 85 L41 102" opacity="0.6"/>
  </g>
  <!-- Tête -->
  <path d="M38 52 C32 38 38 28 50 28 C54 22 64 22 68 28 C80 28 86 38 80 52 C74 60 44 60 38 52 Z" fill="url(#g7)" stroke="#0a0a12" stroke-width="3"/>
  <!-- Oreilles -->
  <path d="M42 32 L38 18 L50 27 Z M76 32 L80 18 L68 27 Z" fill="#16161f" stroke="#0a0a12" stroke-width="2"/>
  <!-- Trois yeux rouges -->
  <ellipse cx="48" cy="42" rx="4" ry="5" fill="#e63946"/>
  <ellipse cx="70" cy="42" rx="4" ry="5" fill="#e63946"/>
  <ellipse cx="59" cy="36" rx="3" ry="4" fill="#ff6b6b"/>
  <ellipse cx="48" cy="42" rx="1.2" ry="3" fill="#0a0a12"/>
  <ellipse cx="70" cy="42" rx="1.2" ry="3" fill="#0a0a12"/>
  <!-- Sourire inquiétant -->
  <path d="M48 52 Q59 58 70 52" stroke="#e63946" stroke-width="1.8" fill="none"/>
</svg>
